name: Crawl Showtimes

on:
  schedule:
    # 6:00 AM Toronto time (EDT = UTC-4, so 10:00 UTC)
    # Runs Tue/Thu/Sat — covers midweek, weekend prep, and weekend additions
    - cron: '0 10 * * 2,4,6'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if data seems current'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd crawler && npm install

      - name: Run crawler
        run: cd crawler && node scrape.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/showtimes.json data/enrichment-cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update showtimes data (${{ github.run_id }})"
            git push
            echo "Pushed updated showtimes data"
          fi
